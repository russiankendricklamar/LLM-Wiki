<svg viewBox="0 0 1200 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="vfBg" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#d946ef"/>
      <stop offset="55%" stop-color="#8b1c8a"/>
      <stop offset="100%" stop-color="#1a0c2e"/>
    </radialGradient>
    <linearGradient id="vfStripe" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fde047" stop-opacity="0.0"/>
      <stop offset="50%" stop-color="#fde047" stop-opacity="1"/>
      <stop offset="100%" stop-color="#fde047" stop-opacity="0.0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="1000" fill="url(#vfBg)"/>

  <!-- Faint grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.06" stroke-width="1">
    <line x1="0"   y1="200" x2="1200" y2="200"/>
    <line x1="0"   y1="400" x2="1200" y2="400"/>
    <line x1="0"   y1="600" x2="1200" y2="600"/>
    <line x1="0"   y1="800" x2="1200" y2="800"/>
    <line x1="200"  y1="0" x2="200"  y2="1000"/>
    <line x1="400"  y1="0" x2="400"  y2="1000"/>
    <line x1="600"  y1="0" x2="600"  y2="1000"/>
    <line x1="800"  y1="0" x2="800"  y2="1000"/>
    <line x1="1000" y1="0" x2="1000" y2="1000"/>
  </g>

  <!-- Eyebrow -->
  <text x="600" y="280"
    text-anchor="middle"
    font-family="ui-monospace, 'SF Mono', Menlo, monospace"
    font-weight="600" font-size="34" letter-spacing="14"
    fill="#fde047" fill-opacity="0.85">
    AI-CODE  REPAIR  MARKETPLACE
  </text>

  <!-- Vibe -->
  <text x="600" y="525"
    text-anchor="middle"
    font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
    font-weight="900" font-size="220" letter-spacing="-8"
    fill="#ffffff">
    Vibe<tspan fill="#fde047">Fix</tspan>
  </text>

  <!-- Tag stripe -->
  <rect x="0" y="640" width="1200" height="6" fill="url(#vfStripe)"/>

  <!-- Caption -->
  <text x="600" y="730"
    text-anchor="middle"
    font-family="Inter, 'Helvetica Neue', Arial, sans-serif"
    font-weight="500" font-size="46" letter-spacing="-1"
    fill="#ffffff" fill-opacity="0.92">
    when the prompt ships broken code
  </text>

  <!-- Bottom mono row -->
  <text x="600" y="850"
    text-anchor="middle"
    font-family="ui-monospace, 'SF Mono', Menlo, monospace"
    font-weight="500" font-size="26" letter-spacing="6"
    fill="#ffffff" fill-opacity="0.55">
    describe → escrow → fix → ship
  </text>
</svg>
