<svg viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07081a"/>
      <stop offset="100%" stop-color="#0a0b12"/>
    </linearGradient>
    <radialGradient id="glow" cx="75%" cy="20%" r="65%">
      <stop offset="0%" stop-color="#0C10E3" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0C10E3" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#glow)"/>

  <!-- LLM WIKI — one line, centered -->
  <text x="800" y="530"
    text-anchor="middle"
    font-family="Futura, 'Century Gothic', 'Trebuchet MS', sans-serif"
    font-weight="900" font-size="240" letter-spacing="-6"
    fill="#F8E6D2">
    LLM WI<tspan fill="#0C10E3">K</tspan>I
  </text>

  <!-- Subtitle -->
  <text x="316" y="615"
    text-anchor="start"
    font-family="Futura, 'Century Gothic', 'Trebuchet MS', sans-serif"
    font-size="26" font-weight="400" letter-spacing="7"
    fill="#D1B17C" opacity="0.8">
    KNOWLEDGE GARDEN
  </text>

  <!-- Corner icon -->
  <rect x="1418" y="828" width="112" height="112" rx="22" fill="#F8E6D2"/>
  <line x1="1474" y1="884" x2="1474" y2="848" stroke="#07081a" stroke-width="3"/>
  <line x1="1474" y1="884" x2="1443" y2="918" stroke="#07081a" stroke-width="3"/>
  <line x1="1474" y1="884" x2="1507" y2="918" stroke="#07081a" stroke-width="3"/>
  <circle cx="1474" cy="848" r="8" fill="#0C10E3"/>
  <circle cx="1443" cy="918" r="8" fill="#0C10E3"/>
  <circle cx="1507" cy="918" r="8" fill="#0C10E3"/>
  <circle cx="1474" cy="884" r="12" fill="#0C10E3"/>

  <!-- Bottom stripe -->
  <rect x="0" y="994" width="1600" height="6" fill="#0C10E3"/>
</svg>
