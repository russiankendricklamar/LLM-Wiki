<svg viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="100" height="100" patternUnits="userSpaceOnUse">
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1600" height="1000" fill="#062e28"/>

  <!-- Grid overlay -->
  <rect width="1600" height="1000" fill="url(#grid)"/>

  <!-- Caption: AI TRAVEL PLANNER -->
  <text
    x="800" y="210"
    text-anchor="middle"
    font-family="'Arial', 'Helvetica Neue', sans-serif"
    font-size="34"
    font-weight="400"
    letter-spacing="14"
    fill="rgba(255,255,255,0.45)">
    AI  TRAVEL  PLANNER
  </text>

  <!-- ULTIMA — sized to ~1380px wide -->
  <text
    x="800" y="570"
    text-anchor="middle"
    font-family="'Arial Black', 'Impact', 'Arial', sans-serif"
    font-size="320"
    font-weight="900"
    fill="white"
    textLength="1380"
    lengthAdjust="spacingAndGlyphs">
    ULTIMA
  </text>

  <!-- THULE — stretched full width -->
  <text
    x="800" y="940"
    text-anchor="middle"
    font-family="'Arial Black', 'Impact', 'Arial', sans-serif"
    font-size="400"
    font-weight="900"
    fill="white"
    textLength="1560"
    lengthAdjust="spacingAndGlyphs">
    THULE
  </text>
</svg>
