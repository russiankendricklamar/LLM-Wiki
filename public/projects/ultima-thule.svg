<svg viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg">
  <!-- Black background — var(--black): #0a0a0a -->
  <rect width="1600" height="1000" fill="#0a0a0a"/>

  <!-- Watermark: "THULE THULE THULE" rotated -5deg, opacity 0.03 — exact hero::before -->
  <text
    transform="rotate(-5 800 500) translate(-200 0)"
    x="0" y="560"
    font-family="'Arial Black','Arial',sans-serif"
    font-weight="900"
    font-size="200"
    letter-spacing="-6"
    fill="#f8f8f8"
    opacity="0.035">
    THULE THULE THULE
  </text>

  <!-- Red tag: AI-POWERED TRAVEL PLANNING — .hero-tag style -->
  <rect x="80" y="88" width="438" height="44" fill="none" stroke="#FF2D2D" stroke-width="2.5"/>
  <text
    x="299" y="118"
    text-anchor="middle"
    font-family="'Courier New','Courier',monospace"
    font-size="17"
    font-weight="700"
    letter-spacing="4"
    fill="#FF2D2D">
    AI-POWERED TRAVEL PLANNING
  </text>

  <!-- ULTIMA — .hero-title Inter 900 -->
  <text
    x="80" y="540"
    font-family="'Arial Black','Impact','Arial',sans-serif"
    font-weight="900"
    font-size="390"
    letter-spacing="-10"
    fill="#f8f8f8">
    ULTIMA
  </text>

  <!-- THULE — stretched wider, accent red on U — matches .accent class -->
  <text
    x="80" y="920"
    font-family="'Arial Black','Impact','Arial',sans-serif"
    font-weight="900"
    font-size="430"
    letter-spacing="-10"
    fill="#f8f8f8"
    textLength="1520"
    lengthAdjust="spacingAndGlyphs">
    TH<tspan fill="#FF2D2D">U</tspan>LE
  </text>

  <!-- App icon bottom-right — .app-icon white square + red circle -->
  <rect x="1420" y="840" width="100" height="100" rx="22" fill="#f8f8f8"/>
  <circle cx="1470" cy="890" r="27" fill="#C62828"/>

  <!-- Red bottom border 6px — #hero border-bottom: 6px solid var(--red) -->
  <rect x="0" y="994" width="1600" height="6" fill="#FF2D2D"/>
</svg>
